<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마석고 교복지도</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%91%94%3C/text%3E%3C/svg%3E" />

  <!-- 실행 문제 진단: 조용한 실패(빈 화면) 대신 화면에 원인을 표시한다. -->
  <script>
  (function () {
    function show(msg) {
      var d = document.getElementById('boot-error');
      if (!d) {
        d = document.createElement('div');
        d.id = 'boot-error';
        d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#0d1014;color:#ffd27a;' +
          'font:15px/1.7 system-ui,"Malgun Gothic",sans-serif;padding:30px;white-space:pre-wrap;overflow:auto';
        (document.body || document.documentElement).appendChild(d);
      }
      d.textContent = '⚠ [마석고 교복지도] 실행 문제\n\n' + msg;
    }
    // 1) file:// 로 직접 연 경우 (가장 흔한 원인)
    if (location.protocol === 'file:') {
      document.addEventListener('DOMContentLoaded', function () {
        show('이 게임은 "로컬 서버"로 실행해야 합니다.\n' +
          'index.html 을 직접 더블클릭하면(file://) 모듈이 차단되어 작동하지 않습니다.\n\n' +
          '➡ 폴더 안의 "시작.bat" 을 더블클릭하세요.\n' +
          '   브라우저 주소창이 http://localhost:8000 이어야 정상입니다.');
      });
    }
    // 2) importmap 미지원 (오래된 브라우저)
    if (window.HTMLScriptElement && (!HTMLScriptElement.supports || !HTMLScriptElement.supports('importmap'))) {
      document.addEventListener('DOMContentLoaded', function () {
        show('이 브라우저는 importmap 을 지원하지 않습니다.\n최신 Chrome 또는 Edge(엣지) 로 열어주세요.');
      });
    }
    // 3) 스크립트/모듈 로딩 또는 실행 중 오류 (예: three.js CDN 로딩 실패)
    window.addEventListener('error', function (e) {
      var m = (e && e.message) || (e && e.error && e.error.message) || '알 수 없는 오류';
      var src = (e && e.filename) ? ('\n위치: ' + e.filename + ':' + (e.lineno || '')) : '';
      show(m + src + '\n\n(three.js 로딩 실패라면 인터넷 연결/방화벽/CDN 차단을 확인하세요.)');
    }, true);
    window.addEventListener('unhandledrejection', function (e) {
      var r = e && e.reason;
      show('처리되지 않은 오류:\n' + ((r && r.message) || r || ''));
    });
  })();
  </script>

  <!-- Three.js ESM (jsdelivr). 모든 모듈은 'three' / 'three/addons/' 로 import. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- 모든 오버레이 UI(타이틀/HUD/대화/요약)는 여기에 그려짐. -->
  <div id="ui-root"></div>

  <!-- 렌더러 캔버스는 main.js 가 <body> 에 직접 append 함. -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
